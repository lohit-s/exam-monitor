<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Online Exam Portal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 40%, #0f766e 100%);
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .card {
      width: 100%;
      max-width: 700px;
      background: rgba(15,23,42,0.95);
      border-radius: 18px;
      padding: 20px 22px;
      box-shadow: 0 25px 50px rgba(15,23,42,0.9);
      border: 1px solid rgba(148,163,184,0.5);
    }
    .header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 14px;
      align-items: center;
    }
    .title {
      font-size: 22px;
      font-weight: 600;
    }
    .pill {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      border: 1px solid rgba(56,189,248,0.6);
      color: #7dd3fc;
      background: rgba(8,47,73,0.6);
    }
    .section {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(15,23,42,0.9);
      border: 1px solid rgba(31,41,55,0.9);
    }
    label {
      font-size: 13px;
      color: #9ca3af;
    }
    input {
      width: 100%;
      margin-top: 4px;
      margin-bottom: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #4b5563;
      background: #020617;
      color: #e5e7eb;
      font-size: 14px;
    }
    button {
      padding: 8px 10px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      color: #e5e7eb;
      font-size: 14px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
    }
    .btn-secondary {
      background: linear-gradient(135deg, #22c55e, #16a34a);
    }
    .timer {
      font-size: 16px;
      font-weight: 600;
      color: #fb7185;
    }
    .question {
      margin-bottom: 8px;
      font-size: 14px;
    }
    .message {
      margin-top: 8px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div>
        <div class="title">Student Exam Screen</div>
        <div style="font-size: 12px; color:#9ca3af;">Tab change tracking enabled</div>
      </div>
      <div class="pill">Online Exam Monitor</div>
    </div>

    <div class="section">
      <label for="rollNo">Roll Number</label>
      <input id="rollNo" type="text" placeholder="e.g. 23IT001" />

      <label for="duration">Duration (minutes)</label>
      <input id="duration" type="number" placeholder="60" value="60" />

      <button id="startBtn" class="btn-primary">Start Exam</button>
      <span id="status" class="message"></span>
    </div>

    <div class="section" id="examSection" style="display:none; margin-top:12px;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
        <div>
          <div style="font-size:14px;">Exam in progress...</div>
          <div id="warn" style="font-size:12px; color:#f97316;"></div>
        </div>
        <div class="timer" id="timer">60:00</div>
      </div>

      <div style="margin-top:6px;">
        <div class="question">Q1. What is Node.js mainly used for?</div>
        <input type="text" placeholder="Your answer..." />

        <div class="question">Q2. What does React help you build?</div>
        <input type="text" placeholder="Your answer..." />

        <div class="question">Q3. What is MongoDB?</div>
        <input type="text" placeholder="Your answer..." />

        <div class="question">Q4. What is an API?</div>
        <input type="text" placeholder="Your answer..." />

        <div class="question">Q5. What is full-stack development?</div>
        <input type="text" placeholder="Your answer..." />
      </div>

      <button id="submitBtn" class="btn-secondary" style="margin-top:10px;">
        Submit Exam
      </button>
      <div id="cheatInfo" class="message"></div>
    </div>
  </div>

  <script>
    const API_BASE = "https://exam-monitor-0dm2.onrender.com"; // ✅ Render URL

    const rollInput = document.getElementById("rollNo");
    const durationInput = document.getElementById("duration");
    const startBtn = document.getElementById("startBtn");
    const statusEl = document.getElementById("status");
    const examSection = document.getElementById("examSection");
    const timerEl = document.getElementById("timer");
    const warnEl = document.getElementById("warn");
    const cheatInfoEl = document.getElementById("cheatInfo");
    const submitBtn = document.getElementById("submitBtn");

    let leaveCount = 0;
    let maxLeaves = 5;
    let timerId = null;
    let remainingSeconds = 0;
    let lastFlagTime = 0;
    const FLAG_COOLDOWN = 3000;

    function showStatus(text, ok = true) {
      statusEl.textContent = text;
      statusEl.style.color = ok ? "#6ee7b7" : "#f97373";
    }

    async function startExam() {
      const rollNo = rollInput.value.trim();
      const duration = parseInt(durationInput.value, 10) || 60;

      if (!rollNo) {
        showStatus("Roll No required", false);
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/api/start-exam`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ rollNo, duration }),
        });
        const data = await res.json();
        if (!res.ok) {
          showStatus(data.error || "Error starting exam", false);
          return;
        }

        showStatus("Exam started. Do not change tab!", true);
        examSection.style.display = "block";

        remainingSeconds = duration * 60;
        updateTimer();
        if (timerId) clearInterval(timerId);
        timerId = setInterval(() => {
          remainingSeconds--;
          if (remainingSeconds <= 0) {
            clearInterval(timerId);
            timerEl.textContent = "00:00";
            alert("Time over! Exam auto-submitted.");
          } else {
            updateTimer();
          }
        }, 1000);
      } catch (err) {
        console.error(err);
        showStatus("Cannot reach server. Please try again.", false);
      }
    }

    function updateTimer() {
      const m = String(Math.floor(remainingSeconds / 60)).padStart(2, "0");
      const s = String(remainingSeconds % 60).padStart(2, "0");
      timerEl.textContent = `${m}:${s}`;
    }

    async function sendCheatFlag() {
      const now = Date.now();
      if (now - lastFlagTime < FLAG_COOLDOWN) return;
      lastFlagTime = now;

      const rollNo = rollInput.value.trim();
      if (!rollNo) return;

      leaveCount++;
      const infoText = `Tab change detected ${leaveCount}/${maxLeaves}`;
      warnEl.textContent = infoText;
      cheatInfoEl.textContent = infoText + " • This is being sent to admin.";

      try {
        await fetch(`${API_BASE}/api/simulate-cheat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            rollNo,
            site: `TAB_EXIT_${leaveCount}_of_${maxLeaves}`,
          }),
        });
      } catch (err) {
        console.error(err);
      }

      if (leaveCount >= maxLeaves) {
        alert("Maximum tab changes reached! Exam may be cancelled by admin.");
      }
    }

    document.addEventListener("visibilitychange", () => {
      if (document.hidden) sendCheatFlag();
    });

    window.addEventListener("blur", () => {
      sendCheatFlag();
    });

    startBtn.addEventListener("click", startExam);

    submitBtn.addEventListener("click", () => {
      alert("Exam submitted. Thank you!");
    });
  </script>
</body>
</html>
